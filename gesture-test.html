<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="手势浏览插件的捏合与左右挥动滚动验收页面。" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>手势浏览插件测试页</title>
  </head>
  <body>
    <header class="test-header">
      <div>
        <p>GESTURE CONTROL / TEST PAGE</p>
        <h1>浏览动作验收</h1>
      </div>
      <div class="page-counter">捏合与左右挥动测试</div>
    </header>

    <main>
      <section class="hero">
        <span class="index">01</span>
        <h2>捏合上拖：向下浏览</h2>
        <p>拇指食指捏住后把手向上拖，反色圆点会跟随手指，页面应连续显示下方内容。</p>
      </section>
      <section class="chapter chapter--warm">
        <span class="index">02</span>
        <h2>向左挥：向上翻一屏</h2>
        <p>识别后中央显示绿色空心向上箭头，页面应平滑上滚约四分之三屏。</p>
      </section>
      <section class="chapter chapter--cool">
        <span class="index">03</span>
        <h2>向右挥：向下翻一屏</h2>
        <p>识别后中央显示绿色空心向下箭头，页面应平滑下滚约四分之三屏。</p>
      </section>
      <section class="chapter chapter--dark">
        <span class="index">04</span>
        <h2>输入保护</h2>
        <p>点击输入框后挥动手掌，插件应该忽略动作，避免打字时误触。</p>
        <label>输入保护测试 <input type="text" placeholder="点击这里，然后挥动手掌" /></label>
      </section>
    </main>

    <script type="module" src="/src/gesture-test.ts"></script>
  </body>
</html>
