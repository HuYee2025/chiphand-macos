<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="手势浏览插件的滚动与左右翻页验收页面。" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>手势浏览插件测试页</title>
  </head>
  <body>
    <header class="test-header">
      <div>
        <p>GESTURE CONTROL / TEST PAGE</p>
        <h1>浏览动作验收</h1>
      </div>
      <div class="page-counter">第 <strong id="page-number">1</strong> / 5 页</div>
    </header>

    <main>
      <section class="hero">
        <span class="index">01</span>
        <h2>向上、向下挥动手掌</h2>
        <p>页面每次应平滑滚动约四分之三屏。继续向下测试三个章节，再测试左右翻页。</p>
      </section>
      <section class="chapter chapter--warm">
        <span class="index">02</span>
        <h2>向左挥：上一页</h2>
        <p>测试页监听 ArrowLeft。页码应减少一次，不应该连续跳页。</p>
      </section>
      <section class="chapter chapter--cool">
        <span class="index">03</span>
        <h2>向右挥：下一页</h2>
        <p>测试页监听 ArrowRight。页码应增加一次，最大为第 5 页。</p>
      </section>
      <section class="chapter chapter--dark">
        <span class="index">04</span>
        <h2>输入保护</h2>
        <p>点击输入框后挥动手掌，插件应该忽略动作，避免打字时误触。</p>
        <label>输入保护测试 <input type="text" placeholder="点击这里，然后挥动手掌" /></label>
      </section>
    </main>

    <div id="action-toast" class="action-toast" role="status">等待左右翻页动作</div>
    <script type="module" src="/src/gesture-test.ts"></script>
  </body>
</html>
