<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>手势浏览控制</title>
  </head>
  <body>
    <main id="panel-shell" class="panel-shell">
      <header class="panel-header">
        <div>
          <h1>手势浏览</h1>
        </div>
        <div class="header-actions">
          <span id="runtime-status" class="status-chip">未启动</span>
        </div>
      </header>

      <section class="camera-card" aria-label="摄像头识别画面">
        <div class="camera-stage">
          <video id="camera-video" autoplay playsinline muted></video>
          <canvas id="landmark-canvas"></canvas>
          <div id="camera-placeholder" class="camera-placeholder">
            <span class="camera-mark" aria-hidden="true"></span>
            <span id="camera-placeholder-label">CAMERA OFF</span>
          </div>
        </div>
        <div class="camera-meta">
          <span id="hand-status">等待摄像头</span>
          <strong id="gesture-status">挥动手掌控制网页</strong>
        </div>
      </section>

      <button id="camera-toggle" class="primary-button" type="button">开启摄像头</button>
      <button id="advanced-toggle" class="advanced-toggle" type="button" aria-expanded="false" aria-controls="advanced-settings">
        高级设置
        <span aria-hidden="true">＋</span>
      </button>
      <section id="advanced-settings" class="advanced-settings" hidden aria-label="高级设置">
        <label class="setting-row" for="swipe-sensitivity">
          <span>左右挥手灵敏度 <output id="swipe-sensitivity-value" for="swipe-sensitivity">50 · 标准</output></span>
          <input id="swipe-sensitivity" type="range" min="0" max="100" step="1" value="50" />
          <small>数值越大，越短的横向挥动即可翻屏。</small>
        </label>
        <label class="setting-row" for="pinch-sensitivity">
          <span>手指捏合灵敏度 <output id="pinch-sensitivity-value" for="pinch-sensitivity">50 · 标准</output></span>
          <input id="pinch-sensitivity" type="range" min="0" max="100" step="1" value="50" />
          <small>数值越大，允许拇指与食指留有更小间隙。</small>
        </label>
        <div class="overlay-options" aria-label="网页开发者叠层">
          <label class="toggle-row" for="show-hand-grid">
            <span><strong>显示手部网格</strong><small>在网页上显示 21 点骨架，仅用于调试。</small></span>
            <input id="show-hand-grid" type="checkbox" />
            <i aria-hidden="true"></i>
          </label>
          <label class="toggle-row" for="show-pinch-dot">
            <span><strong>显示捏合控制圆点</strong><small>在网页上显示反色定位点，仅用于调试。</small></span>
            <input id="show-pinch-dot" type="checkbox" />
            <i aria-hidden="true"></i>
          </label>
        </div>
      </section>
      <p id="panel-message" class="panel-message" role="status"></p>
    </main>
    <script type="module" src="./sidepanel.ts"></script>
  </body>
</html>
